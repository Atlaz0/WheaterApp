<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyCast - Weather App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            min-height: 100vh;
            color: white;
            font-family: system-ui, -apple-system, sans-serif;
        }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .city-card:active {
            transform: scale(0.98);
        }
        .hidden-page {
            display: none;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="app" class="max-w-md mx-auto">
        <!-- Main Dashboard -->
        <div id="dashboard-page">
            <header class="mb-8">
                <h1 class="text-3xl font-bold">SkyCast</h1>
                <p class="text-slate-400">Your local weather at a glance</p>
            </header>

            <div id="city-list" class="space-y-4">
                <!-- Static Card for New York -->
                <div id="ny-card" class="city-card glass rounded-2xl p-6 flex justify-between items-center cursor-pointer transition-all hover:bg-white/10">
                    <div>
                        <h2 class="text-xl font-semibold">{{city.name}}</h2>
                        <p class="text-slate-400 text-sm">{{city.state}}</p> <!-- Clear for example -->
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="text-2xl font-bold">{{city.tempature}}°</span>
                        <!-- Sun Icon SVG -->
                        <svg class="text-yellow-400" xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
                    </div>
                </div>
            </div>
        </div>

        <!-- Detail Page -->
        <div id="detail-page" class="hidden-page">
            <button id="back-btn" class="mb-6 flex items-center text-slate-400 hover:text-white transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mr-2"><path d="m15 18-6-6 6-6"/></svg>
                Back to Cities
            </button>

            <div id="city-detail-content">
                <!-- Detailed info for the city -->
                <div class="text-center mb-10">
                    <h1 class="text-4xl font-bold mb-2">{{city.name}}</h1>
                    <div class="flex justify-center mb-4">
                        <svg class="text-yellow-400" xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
                    </div>
                    <div class="text-6xl font-bold mb-2">{{city.tempature}}°C</div>
                    <p class="text-xl text-slate-400 uppercase tracking-widest">Clear Sky</p>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="glass rounded-2xl p-4 text-center">
                        <p class="text-slate-400 text-xs uppercase mb-1">Day High</p>
                        <p class="text-2xl font-semibold text-orange-400">{{city.tempature_day}}°</p>
                    </div>
                    <div class="glass rounded-2xl p-4 text-center">
                        <p class="text-slate-400 text-xs uppercase mb-1">Night Low</p>
                        <p class="text-2xl font-semibold text-blue-300">{{city.tempature_night}}°</p>
                    </div>
                </div>

                <div class="mt-8 glass rounded-2xl p-6">
                    <h3 class="text-sm font-bold uppercase text-slate-400 mb-2">Details</h3>
                    <p class="text-slate-200">{{city.details}}</p> <!-- for example: It's a beautiful clear day in New York. Perfect for a walk in Central Park! -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // Simple navigation logic
        const dashboard = document.getElementById('dashboard-page');
        const detail = document.getElementById('detail-page');
        const nyCard = document.getElementById('ny-card');
        const backBtn = document.getElementById('back-btn');

        nyCard.onclick = () => {
            dashboard.classList.add('hidden-page');
            detail.classList.remove('hidden-page');
        };

        backBtn.onclick = () => {
            dashboard.classList.remove('hidden-page');
            detail.classList.add('hidden-page');
        };
    </script>
</body>
</html>
