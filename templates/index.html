<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyCast - Weather App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            min-height: 100vh;
            color: white;
            font-family: system-ui, -apple-system, sans-serif;
        }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-md mx-auto">
        <header class="mb-8">
            <h1 class="text-3xl font-bold">SkyCast</h1>
            <p class="text-slate-400">Your local weather at a glance</p>
        </header>
        <div class="space-y-4">
            {% for city in cities %}
            <a href="/city/{{ city.name }}" class="block glass rounded-2xl p-6 flex justify-between items-center transition-all hover:bg-white/10 active:scale-95">
                <div>
                    <h2 class="text-xl font-semibold">{{ city.name }}</h2>
                    <p class="text-slate-400 text-sm">{{ city.status }}</p>
                </div>
                <div class="flex items-center gap-4">
                    <span class="text-2xl font-bold">{{ city.current }}°</span>
                    {% if city.status == 'Clear' %}
                        <span class="text-2xl">☀️</span>
                    {% elif city.status == 'Rain' %}
                        <span class="text-2xl">🌧️</span>
                    {% elif city.status == 'Snow' %}
                        <span class="text-2xl">❄️</span>
                    {% else %}
                        <span class="text-2xl">☁️</span>
                    {% endif %}
                </div>
            </a>
            {% endfor %}
        </div>
    </div>
</body>
</html>
